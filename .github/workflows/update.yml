name: New Update From Template

on:
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_update: ${{ steps.check_changes.outputs.should_update }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Fetch Template
        run: |
          git clone --depth 1 https://github.com/Thre4dripper/NodeTs-Express-Service-Based-Template template
          mkdir -p src/config src/enums
          cp template/src-typescript/config/socketConfig.ts src/config/socketConfig.ts
          cp template/src-typescript/config/swaggerConfig.ts src/config/swaggerConfig.ts
          cp template/src-typescript/config/cronConfig.ts src/config/cronConfig.ts
          cp template/src-typescript/app/utils/MasterController.ts src/MasterController.ts
          cp template/src-typescript/app/utils/AsyncHandler.ts src/AsyncHandler.ts
          cp template/src-typescript/app/utils/RequestBuilder.ts src/RequestBuilder.ts
          cp template/src-typescript/app/utils/ResponseBuilder.ts src/ResponseBuilder.ts
          cp template/src-typescript/app/utils/CronBuilder.ts src/CronBuilder.ts
          cp template/src-typescript/app/utils/GrpcClientFactory.ts src/GrpcClientFactory.ts
          cp template/src-typescript/app/utils/GrpcMiddleware.ts src/GrpcMiddleware.ts
          cp template/src-typescript/app/utils/Logger.ts src/Logger.ts
          cp template/src-typescript/app/handlers/CustomErrorHandler.ts src/CustomErrorHandler.ts
          cp template/src-typescript/app/enums/CronJob.ts src/enums/CronJob.ts
          cp template/src-typescript/app/enums/StatusCodes.ts src/enums/StatusCodes.ts
          rm -rf template

      - name: Fix Imports
        run: |
          sed -i 's|/app/utils||g' src/config/socketConfig.ts src/config/swaggerConfig.ts src/config/cronConfig.ts
          sed -i 's|../../config/swaggerConfig|./config/swaggerConfig|g' src/MasterController.ts
          sed -i 's|../handlers/CustomErrorHandler|./CustomErrorHandler|g' src/MasterController.ts
          sed -i 's|../enums/|./enums/|g' src/CronBuilder.ts src/CustomErrorHandler.ts src/ResponseBuilder.ts
          sed -i 's|../utils/Logger|./Logger|g' src/CustomErrorHandler.ts
          sed -i 's|node-service-template|express-master-controller|g' src/Logger.ts
          sed -i 's|\.catch((error) => call.emit|.catch((error: any) => call.emit|g' src/MasterController.ts

      - name: Install Dependencies
        run: |
          yarn install --frozen-lockfile

      - name: Format
        run: yarn format

      - name: Build
        run: yarn build

      - name: Check Changes
        id: check_changes
        run: |
          git diff --exit-code || echo "should_update=true" >> $GITHUB_OUTPUT

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            ./**
            !node_modules/**

      - name: List files and folders
        run: ls -la

  update:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.should_update == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Push changes
        run: |
          git config --global user.name 'Update Bot'
          git config --global user.email 'updatebot@gmail.com'
          git add .
          git commit -m "Updated from template"
          git push